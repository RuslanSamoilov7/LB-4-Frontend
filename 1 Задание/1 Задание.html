<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            padding: 20px;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ccc;
        }
        img {
            height: 130px; 
        }
        .progress {
            position: relative;
            height: 20px;
            margin-bottom: 10px;
            border: 1px solid purple;
        }
        .process {
            width: 40%;
            height: 100%;
            background-color: rgb(216, 234, 243);
        }
        .utext {
            position: absolute;
            left: 10px;
            top: 0;
            line-height: 20px;
        }
        .text {
            position: absolute;
            right: 10px;
            top: 0;
            line-height: 20px;
        }
        .title {
            font-weight: bold;
            font-size: 25px;
        }
        button {
            margin-bottom: 90px;
            padding: 4px 30px;
            background-color: #022355;
            color: white;
            border: none;
        }
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                align-items: stretch;
                height: 350px;
            }
            button {
                width: 100%;
            }
            img {
                margin: 0 auto;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <img src="https://th.bing.com/th/id/OIP.6bIPPtfm3r2wRA2SFmlpewHaHa?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3" alt="img">
        <div class="info">
            <div class="progress">
            <div class="process"></div>
            <span class="utext">Uploading 40%</span>
            <span class="text">About 23 minutes remaining</span>
            </div>
            <div class="title">Title of video</div>
            <p>* Your video is still uploading. Please keep this page open until it’s done.</p>
        </div>
        <button>DONE</button>
    </div>
</body>
</html>
